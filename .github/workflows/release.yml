name: Build and Release Plugin

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Download Dalamud SDK files
        shell: pwsh
        run: |
          $dalamudPath = "$env:APPDATA\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Path $dalamudPath -Force | Out-Null
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip $dalamudPath

      - name: Build Release
        run: dotnet build FFXIVHudPlugin.csproj -c Release --no-restore

      - name: Validate package metadata and artifacts
        shell: pwsh
        run: |
          pwsh -ExecutionPolicy Bypass -File .\scripts\validate-package.ps1

      - name: Package Plugin
        shell: pwsh
        run: |
          $outDir = "bin/Release/FFXIVHudPlugin/latest.zip"
          $zipPath = "FFXIVHudPlugin.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Copy-Item -Path $outDir -Destination $zipPath -Force

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: FFXIVHudPlugin.zip
          generate_release_notes: true
